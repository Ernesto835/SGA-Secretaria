spring.application.name=sga-secretaria-backend
server.port=${PORT:5176}

# --- Base de datos (usada por DataSourceConfig para armar la URL JDBC) ---
db.host=${DB_HOST}
db.port=${DB_PORT:5432}
db.name=${DB_NAME}
db.user=${DB_USER}
db.password=${DB_PASSWORD}
db.ssl=${DB_SSL:false}

# --- JWT (mismo secret que sga-principal) ---
app.jwt.secret=${JWT_SECRET}

# --- Cifrado AES-256-GCM de campos sensibles (direccion/telefono/tipo_discapacidad) ---
app.crypto.secret-key=${AES_SECRET_KEY}

# --- CORS ---
app.cors.origin=${CORS_ORIGIN:*}

# --- Institucion (encabezados de PDF) ---
app.institucion.nombre=${INST_NOMBRE:Unidad Educativa}
app.institucion.ciudad=${INST_CIUDAD:Ecuador}

# --- Frontend estatico (client/dist), relativo al working directory del proceso ---
# (el working directory se fija en la raiz del repo, ver spring-boot-maven-plugin en pom.xml)
app.frontend.dist-path=${FRONTEND_DIST_PATH:client/dist}

# --- Jackson: fechas como ISO-8601, no timestamps epoch ---
spring.jackson.serialization.write-dates-as-timestamps=false

logging.level.root=INFO
logging.level.ec.uteq.sga.secretaria=DEBUG
